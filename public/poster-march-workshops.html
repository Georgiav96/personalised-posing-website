<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>March Workshops Poster</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Yeseva+One&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a1a;
      padding: 20px;
    }
    
    .poster {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(180deg, #000000 0%, #1a0a2e 50%, #000000 100%);
      padding: 60px;
      display: flex;
      flex-direction: column;
      font-family: 'Josefin Sans', sans-serif;
      color: white;
      position: relative;
      overflow: hidden;
    }
    
    .poster::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(149, 0, 255, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 70% 80%, rgba(95, 0, 186, 0.1) 0%, transparent 40%);
      pointer-events: none;
    }
    
    .content {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      text-align: center;
      margin-bottom: 50px;
    }
    
    .subtitle {
      font-size: 18px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #9500ff;
      margin-bottom: 20px;
    }
    
    .title {
      font-family: 'Yeseva One', serif;
      font-size: 72px;
      line-height: 1.1;
      margin-bottom: 15px;
    }
    
    .month {
      font-family: 'Yeseva One', serif;
      font-size: 48px;
      color: #9500ff;
    }
    
    .workshops {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 30px;
      padding: 40px 0;
    }
    
    .workshop {
      display: flex;
      align-items: center;
      padding: 30px 40px;
      background: rgba(149, 0, 255, 0.08);
      border-left: 4px solid #9500ff;
      border-radius: 0 16px 16px 0;
    }
    
    .workshop-date {
      font-family: 'Yeseva One', serif;
      font-size: 42px;
      color: #9500ff;
      min-width: 180px;
    }
    
    .workshop-divider {
      width: 2px;
      height: 50px;
      background: rgba(149, 0, 255, 0.3);
      margin: 0 40px;
    }
    
    .workshop-info {
      flex: 1;
    }
    
    .workshop-fed {
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #dccbff;
      margin-bottom: 8px;
    }
    
    .workshop-name {
      font-family: 'Yeseva One', serif;
      font-size: 32px;
    }
    
    .footer {
      text-align: center;
      padding-top: 40px;
      border-top: 1px solid rgba(149, 0, 255, 0.2);
    }
    
    .cta {
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #dccbff;
      margin-bottom: 15px;
    }
    
    .brand {
      font-family: 'Yeseva One', serif;
      font-size: 28px;
      color: #9500ff;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="content">
      <div class="header">
        <p class="subtitle">Personalised Posing</p>
        <h1 class="title">Upcoming<br>Workshops</h1>
        <p class="month">March 2025</p>
      </div>
      
      <div class="workshops">
        <div class="workshop">
          <div class="workshop-date">01/03</div>
          <div class="workshop-divider"></div>
          <div class="workshop-info">
            <p class="workshop-fed">NBA</p>
            <p class="workshop-name">Workshop 1: Comparisons</p>
          </div>
        </div>
        
        <div class="workshop">
          <div class="workshop-date">14/03</div>
          <div class="workshop-divider"></div>
          <div class="workshop-info">
            <p class="workshop-fed">ICN</p>
            <p class="workshop-name">Workshop 2: Stage Control</p>
          </div>
        </div>
        
        <div class="workshop">
          <div class="workshop-date">15/03</div>
          <div class="workshop-divider"></div>
          <div class="workshop-info">
            <p class="workshop-fed">NBA</p>
            <p class="workshop-name">Workshop 2: I-Walk</p>
          </div>
        </div>
        
        <div class="workshop">
          <div class="workshop-date">29/03</div>
          <div class="workshop-divider"></div>
          <div class="workshop-info">
            <p class="workshop-fed">NBA</p>
            <p class="workshop-name">Workshop 3: Rehearsal</p>
          </div>
        </div>
      </div>
      
      <div class="footer">
        <p class="cta">Book your spot now</p>
        <p class="brand">@personalised_posing</p>
      </div>
    </div>
  </div>
</body>
</html>
